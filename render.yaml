services:
  # ── Datastores ───────────────────────────────────────────────────────────────
  - type: redis
    name: pancake-redis
    plan: free

  # ── Python API (FastAPI gateway) ─────────────────────────────────────────────
  - type: web
    name: pancake-api
    env: python
    buildCommand: "pip install -r agents/requirements.txt"
    startCommand: "uvicorn services.api.app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: pancake-redis
          property: connectionString
      - key: EXEC_MODE
        value: paper
      - key: RISK_PROFILE
        value: moderate
      - key: CAPITAL_USD
        value: "10000"
      - key: API_KEY
        generateValue: true    # Render generates a secret; set NEXT_PUBLIC_API_KEY to match

  # ── Python Agents (strategy + risk + portfolio swarm) ────────────────────────
  - type: worker
    name: pancake-agents
    env: python
    buildCommand: "pip install -r agents/requirements.txt"
    # Seed demo market state on every (re)start, then run the agent loop.
    # Without live ingestion, seeding ensures the scanner always has pools to scan.
    startCommand: "python scripts/seed_market.py && python -m agents.main"
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: pancake-redis
          property: connectionString
      - key: EXEC_MODE
        value: paper
      - key: RISK_PROFILE
        value: moderate
      - key: CAPITAL_USD
        value: "10000"

  # ── Next.js Dashboard ────────────────────────────────────────────────────────
  - type: web
    name: pancake-dashboard
    env: node
    buildCommand: "npm install -g pnpm && pnpm install && pnpm --filter @pancakeflow/web build"
    startCommand: "pnpm --filter @pancakeflow/web start"
    envVars:
      - key: NEXT_PUBLIC_API
        fromService:
          type: web
          name: pancake-api
          property: url
      # Set this to the same value as the API_KEY above so the NL console works.
      # On Render, copy the generated API_KEY value here after first deploy.
      - key: NEXT_PUBLIC_API_KEY
        value: demo-key
