services:
  # ── Datastores ───────────────────────────────────────────────────────────────
  - type: redis
    name: pancake-redis
    plan: free
    ipAllowList: []              # allow all — required by Render blueprint schema

  # ── Python API (FastAPI gateway) ─────────────────────────────────────────────
  - type: web
    name: pancake-api
    env: python
    plan: free
    buildCommand: "pip install -r agents/requirements.txt"
    startCommand: "uvicorn services.api.app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: pancake-redis
          property: connectionString
      - key: EXEC_MODE
        value: paper
      - key: RISK_PROFILE
        value: moderate
      - key: CAPITAL_USD
        value: "10000"
      - key: API_KEY
        generateValue: true

  # ── Python Agents (strategy + risk + portfolio swarm) ────────────────────────
  # type:web not worker — Render free tier doesn't support background workers.
  # agents_web_wrapper.py binds PORT for Render's health check while running
  # the full agent loop in the main thread.
  - type: web
    name: pancake-agents
    env: python
    plan: free
    buildCommand: "pip install -r agents/requirements.txt"
    startCommand: "python scripts/seed_market.py && python scripts/agents_web_wrapper.py"
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: pancake-redis
          property: connectionString
      - key: EXEC_MODE
        value: paper
      - key: RISK_PROFILE
        value: moderate
      - key: CAPITAL_USD
        value: "10000"

  # ── Next.js Dashboard ────────────────────────────────────────────────────────
  - type: web
    name: pancake-dashboard
    env: node
    plan: free
    buildCommand: "pnpm install && pnpm --filter @pancakeflow/web build"
    startCommand: "pnpm --filter @pancakeflow/web start"
    envVars:
      - key: API_URL
        value: "https://pancake-api.onrender.com"
      - key: NEXT_PUBLIC_API
        value: "https://pancake-api.onrender.com"
      - key: NEXT_PUBLIC_API_KEY
        value: demo-key
